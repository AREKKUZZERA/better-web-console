name: Better-WebConsole
version: '1.0.0'
main: dev.webconsole.BetterWebConsolePlugin
api-version: '1.21'
description: Secure web-based Minecraft server console
authors: [ AREKKUZZERA ]
load: STARTUP

commands:
  betterwebconsole:
    description: Better-WebConsole management commands
    usage: /betterwebconsole <reload|status|adduser|removeuser|listusers>
    permission: betterwebconsole.admin
    aliases: [bwc]

permissions:
  betterwebconsole.admin:
    description: Full access to Better-WebConsole management
    default: op
