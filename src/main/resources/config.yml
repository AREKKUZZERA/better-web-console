# Better-WebConsole Configuration v2.0
# =====================================

web:
  port: 4242
  bind-address: "0.0.0.0"
  log-buffer-size: 1000

security:
  session-timeout: 60
  max-login-attempts: 5
  lockout-duration: 15
  command-rate-limit: 30
  ip-whitelist: []
  csrf-secret: ""

logging:
  log-commands: true
  log-auth: true
  audit-log: true

# Command aliases — shortcuts executed via the web console
# Use !alias-name to trigger. Supports && to chain commands.
aliases:
  restart: "say Server restarting in 10 seconds && title @a times 20 100 20 && title @a subtitle {\"text\":\"Restarting soon!\",\"color\":\"red\"} && title @a {\"text\":\"⚠ WARNING\",\"color\":\"gold\"}"
  tps: "tps"
  list: "list"
  save: "save-all"
  day: "time set day"
  night: "time set night"
  clear-weather: "weather clear"
